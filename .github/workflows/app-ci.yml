# ============================================================
# Seren App — CI Pipeline
# ============================================================
# Runs on push/PR to main when app code changes.
# Jobs: lint, type-check
# ============================================================

name: App CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'ml/**'
      - '*.md'
      - '.github/workflows/ml-pipeline.yml'
  pull_request:
    paths-ignore:
      - 'ml/**'
      - '*.md'
      - '.github/workflows/ml-pipeline.yml'

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint
