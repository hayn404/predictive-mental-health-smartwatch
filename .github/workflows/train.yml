name: train

# Unified training pipeline.
#   - CPU models (stress, ...) train on the GitHub-hosted runner.
#   - Sleep (GPU) is offloaded to a Kaggle T4 kernel via the Kaggle API.
#   - Everything is tracked on DagsHub MLflow.
#   - A champion/challenger gate decides promotion: a freshly-trained model is
#     committed + a candidate PR opened ONLY if it beats the metrics on main.
#     The PR re-runs model-gate.yml (required check), then merge -> deploy.yml.
#
# Trigger it from the Actions tab (Run workflow) and pick the model.

on:
  workflow_dispatch:
    inputs:
      model:
        description: "Which model(s) to train"
        type: choice
        options: [all, all-but-bioage, stress, depression, sleep, focus, bioage]
        default: all

permissions:
  contents: write
  pull-requests: write

env:
  MLFLOW_TRACKING_URI: https://dagshub.com/hayn404/predictive-mental-health-smartwatch.mlflow
  MLFLOW_TRACKING_USERNAME: hayn404
  MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so the gate can read origin/main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r ml/ci/requirements.txt

      - name: Pull feature data (DVC / DagsHub)
        run: |
          dvc remote modify --local origin access_key_id     "${{ secrets.DAGSHUB_TOKEN }}"
          dvc remote modify --local origin secret_access_key "${{ secrets.DAGSHUB_TOKEN }}"
          # Pull ONLY the feature files (.dvc), not the dvc.yaml pipeline stages
          # whose model outs are git-tracked (not in the DVC cache).
          for f in ml/data/features/stress.dvc ml/data/features/depression.dvc ml/data/features/bioage.dvc; do
            [ -f "$f" ] && dvc pull "$f"
          done
          ls -la ml/data/features/ || true

      # ── CPU models train on this runner (feature CSVs pulled from DVC) ──
      - name: Train stress (CPU)
        if: ${{ inputs.model == 'all' || inputs.model == 'all-but-bioage' || inputs.model == 'stress' }}
        run: |
          python ml/stress/src/train.py --params params.yaml \
            --data ml/data/features/stress --out assets/ml/stress \
            --metrics ml/stress/metrics.json

      - name: Train depression (CPU)
        if: ${{ inputs.model == 'all' || inputs.model == 'all-but-bioage' || inputs.model == 'depression' }}
        run: |
          python ml/depression/src/train.py --params params.yaml \
            --data ml/data/features/depression --out assets/ml/depression \
            --metrics ml/depression/metrics.json --figures ml/depression/figures

      # Bio-age trains on the runner too: its features are extracted once on Kaggle
      # (the 5.2 GB Autonomic-Aging set) and cached as CSVs, so training here is just
      # XGBoost — no 5.2 GB download, no 6-hour Kaggle babysitting.
      - name: Train bioage (CPU, from cached features)
        if: ${{ inputs.model == 'all' || inputs.model == 'bioage' }}
        run: |
          if [ -f ml/data/features/bioage/bioage_features_aa.csv ]; then
            python ml/bioage/src/train.py --params params.yaml \
              --data ml/data/features/bioage --out assets/ml/bioage \
              --metrics ml/bioage/metrics.json --figures ml/bioage/figures
          else
            echo "::warning::bioage feature CSVs not found — extract once on Kaggle (see ml/ci/kaggle_run.py --model bioage) and commit them to ml/data/features/bioage/."
          fi

      # ── Data-heavy models train on Kaggle (GPU sleep / CPU focus) ──
      # The kernel downloads the PhysioNet datasets, extracts features, trains,
      # and returns model + metrics + figures + the feature CSVs.
      - name: Train sleep / focus (Kaggle)
        if: ${{ inputs.model == 'all' || inputs.model == 'all-but-bioage' || inputs.model == 'sleep' || inputs.model == 'focus' }}
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          set -e
          run_kaggle () {
            python ml/ci/kaggle_run.py --model "$1" \
              --user "${{ secrets.KAGGLE_USERNAME }}" \
              --repo "${{ github.repository }}" \
              --ref "${{ github.ref_name }}" --mlflow
          }
          M="${{ inputs.model }}"
          if [ "$M" = "all" ] || [ "$M" = "all-but-bioage" ] || [ "$M" = "sleep" ];  then run_kaggle sleep;  fi
          if [ "$M" = "all" ] || [ "$M" = "all-but-bioage" ] || [ "$M" = "focus" ];  then run_kaggle focus;  fi

      - name: Version new feature files (DVC push)
        run: |
          for p in ml/data/features/stress ml/data/features/depression \
                   ml/data/features/bioage \
                   ml/focus/data/cogwear_features_samsung.csv; do
            [ -e "$p" ] && dvc add "$p" || true
          done
          dvc push -q || echo "dvc push skipped"

      - name: Champion/challenger gate
        id: gate
        run: |
          git fetch origin main
          if python ml/ci/gate.py; then
            echo "promote=true" >> "$GITHUB_OUTPUT"
          else
            echo "promote=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open candidate PR (gate passed -> promote)
        if: ${{ steps.gate.outputs.promote == 'true' }}
        env:
          # Public repo: the default token opens the PR. The gate already ran in
          # this job (step above), so the model is validated before the PR. The
          # PR's own model-gate.yml re-check won't auto-run under GITHUB_TOKEN;
          # merge after a quick manual re-run, or add a PAT later if you want it.
          GH_TOKEN: ${{ github.token }}
        run: |
          BR="model/$(date -u +%Y%m%d-%H%M%S)"
          git config user.name  "seren-ci"
          git config user.email "ci@seren.local"
          git checkout -b "$BR"
          git add -A
          git commit -m "model: candidate (${{ inputs.model }}) — beats champion" \
            || { echo "no changes to promote"; exit 0; }
          git push -u origin "$BR"
          gh pr create --base main --head "$BR" --fill \
            --title "model: candidate $BR (gate passed)"

      - name: Report (gate failed -> not promoted)
        if: ${{ steps.gate.outputs.promote == 'false' }}
        run: |
          echo "::warning::Newly trained model did NOT beat the champion on main — not promoting."
          echo "Metrics are still logged to MLflow for inspection."
