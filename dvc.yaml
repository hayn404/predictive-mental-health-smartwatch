# DVC pipeline. `dvc repro` runs the stages; `dvc push` uploads data/model
# artifacts to the DagsHub remote. Data lives in DVC (not git, not Kaggle);
# the small per-model metrics.json stays in git so the CI gate can diff it.
#
# Per-stage contract for the training script:
#   - reads its hyperparameters from params.yaml (the `params:` list below)
#   - reads its input data from data/<model>/  (DVC-tracked, `dvc pull`ed first)
#   - writes the exported model into assets/ml/<model>/
#   - writes ml/<model>/metrics.json  (held-out metrics + a `gate` block)

stages:
  train_sleep:
    cmd: python ml/sleep/train.py --params params.yaml --data ml/data/features/sleep
         --out assets/ml/sleep --metrics ml/sleep/metrics.json
    deps:
      - ml/sleep/train.py
      - ml/sleep/model.py
      - ml/sleep/dataset.py
      - ml/sleep/config.py
      - ml/sleep/convert_onnx_to_tflite.py
      - ml/data/features/sleep/bidsleep_features.pkl
      - ml/data/features/sleep/walch_features.pkl
    params:
      - sleep
    outs:
      - assets/ml/sleep/sleep_stage_model.tflite
      - assets/ml/sleep/sleep_stage_model.onnx
    metrics:
      - ml/sleep/metrics.json:
          cache: false

  train_stress:
    cmd: python ml/stress/src/train.py --params params.yaml --data ml/data/features/stress
         --out assets/ml/stress --metrics ml/stress/metrics.json
    deps:
      - ml/stress/src/train.py
      - ml/stress/src/features.py
      - ml/stress/src/config.py
      - ml/data/features/stress/sipd_features.csv
      - ml/data/features/stress/physiostress_features.csv
      - ml/data/features/stress/wesad_features.csv
    params:
      - stress
    outs:
      - assets/ml/stress/stress_model.json
    metrics:
      - ml/stress/metrics.json:
          cache: false

  # --- replicate per model once its train script honours the contract above ---
  # train_focus / train_bioage / train_depression: same shape as train_stress.
